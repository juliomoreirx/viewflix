        <script>
    $.typeahead({
        input: ".fast-search",
        order: "asc",
        maxItem: false,
        group: {
            template: "{{group}}"
        },
        dropdownFilter: "Todos",
        emptyTemplate: "Não há resultados",
        source: {
            "Canais": {
                display: "name",
                href: "index.php?page=livetv&id={{id|slugify}}",
                ajax: function(query) {
                    return {
                        type: "GET",
                        url: "app/_search.php",
                        path: "data.livetv",
                        data: {
                            q: "{{query}}"
                        },
                        callback: {
                            done: function(data) {
                                return data;
                            }
                        }
                    }
                }
            },
            "Filmes": {
                display: "name",
                href: "index.php?page=moviedetail&id={{id|slugify}}",
                ajax: function(query) {
                    return {
                        type: "GET",
                        url: "app/_search.php",
                        path: "data.movies",
                        data: {
                            q: "{{query}}"
                        },
                        callback: {
                            done: function(data) {
                                return data;
                            }
                        }
                    }
                }

            },
            "Séries": {
                display: "name",
                href: "index.php?page=seriesdetail&id={{id|slugify}}",
                ajax: function(query) {
                    return {
                        type: "GET",
                        url: "app/_search.php",
                        path: "data.series",
                        data: {
                            q: "{{query}}"
                        },
                        callback: {
                            done: function(data) {
                                return data;
                            }
                        }
                    }
                }

            }
        }
    });
    </script>
